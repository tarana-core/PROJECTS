<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spotify - Web Player</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- NAVBAR -->
        <nav class="navbar">

            <!-- LOGO -->
            <div class="logo">
                <a href="#">
                    <i class="fa-brands fa-spotify"></i>
                </a>
            </div>

            <!-- LEFT NAV -->
            <div class="nav-left">

                <div class="icon-btn">
                    <a href="#">
                        <i class="fa-solid fa-house"></i>
                    </a>
                </div>

                <div class="search-bar">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input type="text" placeholder="What do you want to play?">

                    <i class="fa-solid fa-folder-open"></i>

                </div>
            </div>

            <!-- RIGHT NAV -->
            <div class="nav-right">

                <button>Premium</button>
                <button>Support</button>
                <button>Download</button>

                <div class="divider"></div>

                <div class="install-app">
                    <i class="fa-regular fa-circle-down"></i>
                    <span>Install App</span>
                </div>

                <button>Sign up</button>

                <button class="login-btn">Log in</button>

            </div>
        </nav>

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-main-div">
                <div class="header" >
                    <div class="lib" style="display: flex; opacity: 1;"><h3>Your Library</h1></div>
                    <div class="add-icon" >
                        <a href="#"><i class="fa-solid fa-plus"></i></a>
                    </div>
                </div>
                <div>
                    <div class="scrole-bar">
                        <div class="createPlaylist">
                            <h4>Creat Your First playlist</h4>
                            <p>It's easy ,We'll help you</p>
                            <div><button type="button">create Playlist</button></div>
                        </div>
                        
                    </div>
                    <div class="polices"></div>
                    <div class="lang"></div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

        </main>

        <!-- MUSIC PLAYER -->
        <footer class="player">
            Music Player i dont think so
        </footer>

    </div>

</body>

</html>
